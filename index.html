<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F5F1E8">
  <title>作業中 — Work Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1C1B1A;
      --paper: #F5F1E8;
      --paper-deep: #EBE5D5;
      --vermillion: #C8443A;
      --vermillion-soft: #E08074;
      --indigo: #2C4A7B;
      --moss: #5A6E3E;
      --murasaki: #4A3458;
      --nezumi: #6B655D;
      --line: rgba(28, 27, 26, 0.08);
      --shadow: 0 1px 2px rgba(28, 27, 26, 0.04), 0 8px 24px rgba(28, 27, 26, 0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Zen Kaku Gothic New', system-ui, sans-serif;
      font-weight: 400;
      min-height: 100vh;
      overscroll-behavior-y: contain;
    }

    body {
      background-image:
        radial-gradient(at 20% 30%, rgba(200, 68, 58, 0.03), transparent 50%),
        radial-gradient(at 80% 70%, rgba(44, 74, 123, 0.03), transparent 50%);
      max-width: 480px;
      margin: 0 auto;
      padding: max(1rem, env(safe-area-inset-top)) 1.25rem 6rem;
    }

    header {
      padding: 0.5rem 0 1.5rem;
      border-bottom: 1px solid var(--line);
      margin-bottom: 1.25rem;
    }

    .date-line {
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.18em;
      color: var(--nezumi);
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Shippori Mincho', serif;
      font-weight: 500;
      font-size: 2rem;
      margin-top: 0.25rem;
      letter-spacing: 0.08em;
    }

    .summary {
      display: flex;
      gap: 1.25rem;
      margin-top: 0.85rem;
      font-size: 0.825rem;
      color: var(--nezumi);
    }

    .summary strong {
      color: var(--ink);
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.15rem;
      vertical-align: -2px;
      margin-right: 0.25rem;
    }

    .filter-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      overflow-x: auto;
      padding: 0.25rem 0;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .chip {
      flex-shrink: 0;
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: transparent;
      font-size: 0.8rem;
      color: var(--nezumi);
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .chip.active {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .task-card {
      background: white;
      border-radius: 14px;
      padding: 1rem 1.1rem 1rem 1.25rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }
    .task-card:active { transform: scale(0.985); }

    .task-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--cat-color, var(--nezumi));
    }

    .task-card[data-cat="note"] { --cat-color: var(--murasaki); }
    .task-card[data-cat="ai"] { --cat-color: var(--indigo); }
    .task-card[data-cat="kindergarten"] { --cat-color: var(--moss); }
    .task-card[data-cat="temple"] { --cat-color: var(--vermillion); }
    .task-card[data-cat="other"] { --cat-color: var(--nezumi); }

    .task-card.paused { opacity: 0.55; }

    .task-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .task-title {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.05rem;
      font-weight: 500;
      line-height: 1.45;
      letter-spacing: 0.02em;
      flex: 1;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--vermillion);
      flex-shrink: 0;
      margin-top: 0.5rem;
      animation: pulse 2.2s infinite;
    }
    .task-card.paused .status-dot {
      background: var(--nezumi);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(200, 68, 58, 0.45); }
      50% { box-shadow: 0 0 0 7px rgba(200, 68, 58, 0); }
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-top: 0.6rem;
      font-size: 0.75rem;
      color: var(--nezumi);
    }

    .cat-label {
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cat-color, var(--nezumi));
      font-weight: 500;
    }

    .elapsed { font-family: 'JetBrains Mono', monospace; }

    .task-anchor {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      margin-top: 0.55rem;
      font-size: 0.74rem;
      color: var(--indigo);
      text-decoration: none;
      word-break: break-all;
    }
    .task-anchor::before { content: '→ '; }

    .task-notes {
      margin-top: 0.5rem;
      font-size: 0.825rem;
      color: var(--nezumi);
      line-height: 1.6;
    }

    .empty {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--nezumi);
    }
    .empty-mark {
      font-family: 'Shippori Mincho', serif;
      font-size: 4.5rem;
      line-height: 1;
      color: var(--paper-deep);
      margin-bottom: 1rem;
    }

    .fab {
      position: fixed;
      right: 1.25rem;
      bottom: max(1.25rem, env(safe-area-inset-bottom));
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--ink);
      color: var(--paper);
      border: none;
      cursor: pointer;
      font-size: 1.6rem;
      font-family: 'Shippori Mincho', serif;
      box-shadow: 0 4px 16px rgba(28, 27, 26, 0.25);
      transition: transform 0.2s;
      z-index: 100;
    }
    .fab:active { transform: scale(0.92); }

    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(28, 27, 26, 0.4);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .sheet-overlay.open { opacity: 1; pointer-events: auto; }

    .sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-width: 480px;
      margin: 0 auto;
      background: var(--paper);
      border-radius: 20px 20px 0 0;
      padding: 1.25rem 1.25rem max(1.5rem, env(safe-area-inset-bottom));
      z-index: 201;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 85vh;
      overflow-y: auto;
    }
    .sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--paper-deep);
      border-radius: 2px;
      margin: 0 auto 1.25rem;
    }

    .sheet h2 {
      font-family: 'Shippori Mincho', serif;
      font-weight: 500;
      font-size: 1.25rem;
      margin-bottom: 1.25rem;
      letter-spacing: 0.05em;
    }

    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: 0.7rem;
      color: var(--nezumi);
      margin-bottom: 0.4rem;
      letter-spacing: 0.12em;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
    }

    .field input, .field textarea, .field select {
      width: 100%;
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0.7rem 0.8rem;
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--ink);
    }
    .field input:focus, .field textarea:focus {
      outline: 2px solid var(--vermillion-soft);
      outline-offset: -1px;
    }
    .field textarea { min-height: 70px; resize: vertical; }

    .cat-pick {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.4rem;
    }
    .cat-pick button {
      padding: 0.55rem 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      font-family: inherit;
      font-size: 0.78rem;
      cursor: pointer;
      color: var(--nezumi);
      transition: all 0.15s;
    }
    .cat-pick button.selected {
      background: var(--cat-c, var(--ink));
      color: var(--paper);
      border-color: var(--cat-c, var(--ink));
    }
    .cat-pick button[data-cat="note"] { --cat-c: var(--murasaki); }
    .cat-pick button[data-cat="ai"] { --cat-c: var(--indigo); }
    .cat-pick button[data-cat="kindergarten"] { --cat-c: var(--moss); }
    .cat-pick button[data-cat="temple"] { --cat-c: var(--vermillion); }
    .cat-pick button[data-cat="other"] { --cat-c: var(--nezumi); }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-top: 1.25rem;
    }
    .btn {
      padding: 0.8rem;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: white;
      font-family: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      color: var(--ink);
    }
    .btn.primary {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }
    .btn.danger { color: var(--vermillion); }

    .secondary-actions {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.6rem;
    }
    .secondary-actions .btn {
      flex: 1;
      font-size: 0.85rem;
      padding: 0.65rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .task-card { animation: fadeIn 0.4s ease-out backwards; }
    .task-card:nth-child(1) { animation-delay: 0.04s; }
    .task-card:nth-child(2) { animation-delay: 0.08s; }
    .task-card:nth-child(3) { animation-delay: 0.12s; }
    .task-card:nth-child(4) { animation-delay: 0.16s; }
    .task-card:nth-child(5) { animation-delay: 0.20s; }
    .task-card:nth-child(6) { animation-delay: 0.24s; }
  </style>
</head>
<body>
  <header>
    <div class="date-line" id="dateLine">—</div>
    <h1>作業中</h1>
    <div class="summary">
      <span><strong id="activeCount">0</strong>件 進行中</span>
      <span><strong id="pausedCount">0</strong>件 一時停止</span>
    </div>
  </header>

  <div class="filter-bar" id="filterBar">
    <button class="chip active" data-filter="all">すべて</button>
    <button class="chip" data-filter="note">note</button>
    <button class="chip" data-filter="ai">AI</button>
    <button class="chip" data-filter="kindergarten">幼稚園</button>
    <button class="chip" data-filter="temple">寺院</button>
    <button class="chip" data-filter="other">その他</button>
  </div>

  <div class="task-list" id="taskList"></div>

  <button class="fab" id="addBtn" aria-label="追加">＋</button>

  <div class="sheet-overlay" id="sheetOverlay"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <h2 id="sheetTitle">新しい作業</h2>

    <div class="field">
      <label>タイトル</label>
      <input type="text" id="fTitle" placeholder="例: note記事「Buddhism × LLM」執筆">
    </div>

    <div class="field">
      <label>カテゴリ</label>
      <div class="cat-pick" id="catPick">
        <button data-cat="note">note</button>
        <button data-cat="ai">AI</button>
        <button data-cat="kindergarten">幼稚園</button>
        <button data-cat="temple">寺院</button>
        <button data-cat="other">その他</button>
      </div>
    </div>

    <div class="field">
      <label>戻り先 URL (任意)</label>
      <input type="url" id="fAnchor" placeholder="https://...">
    </div>

    <div class="field">
      <label>メモ (任意)</label>
      <textarea id="fNotes" placeholder="どこまで進んだか、次の一歩 など"></textarea>
    </div>

    <div class="actions">
      <button class="btn" id="cancelBtn">キャンセル</button>
      <button class="btn primary" id="saveBtn">保存</button>
    </div>

    <div class="secondary-actions" id="editActions" style="display:none">
      <button class="btn" id="toggleBtn">一時停止 / 再開</button>
      <button class="btn danger" id="deleteBtn">完了して削除</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'work_dashboard_v1';
    const state = {
      tasks: load(),
      filter: 'all',
      editingId: null,
      pickedCat: 'other'
    };

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : seed();
      } catch { return seed(); }
    }

    function seed() {
      const now = Date.now();
      return [
        { id: id(), title: 'note記事「Claude Code × 寺院運営」執筆', category: 'note', status: 'active', anchor: 'https://note.com/charm_bonobo4815', notes: '導入と第1節まで。Claudeに次節をたたき台依頼中', startedAt: now - 1000 * 60 * 47, updatedAt: now },
        { id: id(), title: 'R8年度 預かり保育シフト作成', category: 'kindergarten', status: 'paused', anchor: '', notes: '5月分まで。6月は園長確認待ち', startedAt: now - 1000 * 60 * 60 * 3, updatedAt: now },
        { id: id(), title: 'Claude Code: 園児DBビュー追加', category: 'ai', status: 'active', anchor: '', notes: 'sub-agentで進行中', startedAt: now - 1000 * 60 * 12, updatedAt: now },
        { id: id(), title: '法事案内 文面校正', category: 'temple', status: 'active', anchor: '', notes: '', startedAt: now - 1000 * 60 * 5, updatedAt: now },
      ];
    }

    function id() { return Math.random().toString(36).slice(2, 10); }
    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.tasks)); }

    const fmt = new Intl.DateTimeFormat('ja-JP', { year: 'numeric', month: 'short', day: 'numeric', weekday: 'short' });

    function elapsed(ts) {
      const m = Math.floor((Date.now() - ts) / 60000);
      if (m < 1) return 'たった今';
      if (m < 60) return `${m}分経過`;
      const h = Math.floor(m / 60);
      const rem = m % 60;
      if (h < 24) return `${h}時間${rem}分経過`;
      return `${Math.floor(h / 24)}日経過`;
    }

    const CAT_LABELS = { note: 'NOTE', ai: 'AI', kindergarten: 'KINDER', temple: 'TEMPLE', other: 'OTHER' };

    function render() {
      document.getElementById('dateLine').textContent = fmt.format(new Date());
      const active = state.tasks.filter(t => t.status === 'active').length;
      const paused = state.tasks.filter(t => t.status === 'paused').length;
      document.getElementById('activeCount').textContent = active;
      document.getElementById('pausedCount').textContent = paused;

      const filtered = state.filter === 'all'
        ? [...state.tasks]
        : state.tasks.filter(t => t.category === state.filter);

      filtered.sort((a, b) => {
        if (a.status !== b.status) return a.status === 'active' ? -1 : 1;
        return b.updatedAt - a.updatedAt;
      });

      const list = document.getElementById('taskList');
      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty"><div class="empty-mark">無</div><div>該当する作業なし</div></div>`;
        return;
      }

      list.innerHTML = filtered.map(t => `
        <div class="task-card ${t.status === 'paused' ? 'paused' : ''}" data-cat="${t.category}" data-id="${t.id}">
          <div class="task-head">
            <div class="task-title">${esc(t.title)}</div>
            <div class="status-dot"></div>
          </div>
          <div class="task-meta">
            <span class="cat-label">${CAT_LABELS[t.category] || 'OTHER'}</span>
            <span class="elapsed">${elapsed(t.startedAt)}</span>
          </div>
          ${t.anchor ? `<a href="${esc(t.anchor)}" class="task-anchor" target="_blank" rel="noopener">${esc(truncate(t.anchor, 50))}</a>` : ''}
          ${t.notes ? `<div class="task-notes">${esc(t.notes)}</div>` : ''}
        </div>
      `).join('');

      list.querySelectorAll('.task-card').forEach(el => {
        el.addEventListener('click', e => {
          if (e.target.closest('a')) return;
          openSheet(el.dataset.id);
        });
      });
    }

    function esc(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function truncate(s, n) { return s.length > n ? s.slice(0, n) + '…' : s; }

    document.getElementById('filterBar').addEventListener('click', e => {
      const btn = e.target.closest('.chip');
      if (!btn) return;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      state.filter = btn.dataset.filter;
      render();
    });

    const overlay = document.getElementById('sheetOverlay');
    const sheet = document.getElementById('sheet');

    function openSheet(taskId = null) {
      state.editingId = taskId;
      const editing = taskId ? state.tasks.find(t => t.id === taskId) : null;
      document.getElementById('sheetTitle').textContent = editing ? '作業を編集' : '新しい作業';
      document.getElementById('fTitle').value = editing ? editing.title : '';
      document.getElementById('fAnchor').value = editing ? editing.anchor : '';
      document.getElementById('fNotes').value = editing ? editing.notes : '';
      state.pickedCat = editing ? editing.category : 'other';
      updateCatPick();
      document.getElementById('editActions').style.display = editing ? 'flex' : 'none';
      overlay.classList.add('open');
      sheet.classList.add('open');
    }

    function closeSheet() {
      overlay.classList.remove('open');
      sheet.classList.remove('open');
      state.editingId = null;
    }

    function updateCatPick() {
      document.querySelectorAll('#catPick button').forEach(b => {
        b.classList.toggle('selected', b.dataset.cat === state.pickedCat);
      });
    }

    document.getElementById('catPick').addEventListener('click', e => {
      const b = e.target.closest('button[data-cat]');
      if (!b) return;
      state.pickedCat = b.dataset.cat;
      updateCatPick();
    });

    document.getElementById('addBtn').addEventListener('click', () => openSheet());
    document.getElementById('cancelBtn').addEventListener('click', closeSheet);
    overlay.addEventListener('click', closeSheet);

    document.getElementById('saveBtn').addEventListener('click', () => {
      const title = document.getElementById('fTitle').value.trim();
      if (!title) {
        document.getElementById('fTitle').focus();
        return;
      }
      const data = {
        title,
        category: state.pickedCat,
        anchor: document.getElementById('fAnchor').value.trim(),
        notes: document.getElementById('fNotes').value.trim()
      };
      if (state.editingId) {
        const t = state.tasks.find(x => x.id === state.editingId);
        Object.assign(t, data, { updatedAt: Date.now() });
      } else {
        state.tasks.unshift({ id: id(), ...data, status: 'active', startedAt: Date.now(), updatedAt: Date.now() });
      }
      save();
      closeSheet();
      render();
    });

    document.getElementById('toggleBtn').addEventListener('click', () => {
      if (!state.editingId) return;
      const t = state.tasks.find(x => x.id === state.editingId);
      t.status = t.status === 'active' ? 'paused' : 'active';
      t.updatedAt = Date.now();
      save();
      closeSheet();
      render();
    });

    document.getElementById('deleteBtn').addEventListener('click', () => {
      if (!state.editingId) return;
      state.tasks = state.tasks.filter(x => x.id !== state.editingId);
      save();
      closeSheet();
      render();
    });

    setInterval(render, 60000);
    render();

    /* ────────────────────────────────────────────────────────────
     * Notion API integration (Phase 2 — クロスデバイス同期化)
     *
     * 1. Notion DB を作成:
     *    - Title         (title)
     *    - Category      (select: note / ai / kindergarten / temple / other)
     *    - Status        (select: active / paused)
     *    - Anchor        (url)
     *    - Notes         (rich_text)
     *    - StartedAt     (date)
     *
     * 2. GAS Web App を Notion API プロキシとしてデプロイ:
     *    - PropertiesService に NOTION_TOKEN, NOTION_DB_ID
     *    - doGet(?action=list) → DB query → JSON
     *    - doPost({action, task}) → pages.create / pages.update / archive
     *    - CORS: setMimeType(JSON) + Access-Control-Allow-Origin: *
     *
     * 3. load() / save() を fetch 化:
     *
     *    const ENDPOINT = 'https://script.google.com/macros/s/XXXX/exec';
     *    async function load() {
     *      const r = await fetch(`${ENDPOINT}?action=list`);
     *      return r.json();
     *    }
     *    async function persist(action, task) {
     *      await fetch(ENDPOINT, {
     *        method: 'POST',
     *        body: JSON.stringify({ action, task })
     *      });
     *    }
     * ──────────────────────────────────────────────────────────── */
  </script>
</body>
</html>
